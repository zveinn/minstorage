name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Single job: build the frontend, embed it, cross-compile every backend
  # binary, then publish the release once. No matrix, no artifact hand-off,
  # and no parallel jobs racing to create the same release.
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (copies into backend/static)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Cross-compile backend binaries
        working-directory: backend
        env:
          CGO_ENABLED: "0"
        run: |
          mkdir -p ../dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            export GOOS="${target%/*}" GOARCH="${target#*/}"
            BIN="minstorage-$GOOS-$GOARCH"
            [ "$GOOS" = "windows" ] && BIN="$BIN.exe"
            echo "Building $BIN"
            go build -trimpath -ldflags "-s -w" -o "../dist/$BIN" .
          done

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/minstorage-*
          overwrite_files: true
